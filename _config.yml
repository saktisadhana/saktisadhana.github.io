# Site Settings
title: Sakti Sadhana
description: "IT undergrad exploring cybersecurity through CTF competitions, security research, and hands-on problem solving."
url: "https://saktisadhana.github.io"
baseurl: ""
author:
  name: Sakti Sadhana
  email: ""
  bio: "IT Undergrad. CTF player. Building things on the internet."
lang: en

# SEO (jekyll-seo-tag)
twitter:
  card: summary_large_image
social:
  name: Sakti Sadhana
  links:
    - https://github.com/saktisadhana
# Default social-share image (1200x630). Used on any page without a per-page og_image.
og_image: /assets/og-default.svg

# Build Settings
markdown: kramdown
highlighter: rouge
permalink: /blog/:title/

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  projects:
    output: false
  writeups:
    output: true
    permalink: /writeups/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - node_modules
  - vendor

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      seo:
        type: BlogPosting
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"
      seo:
        type: BlogPosting

# Feed
feed:
  path: feed.xml

# Tag descriptions
tag_descriptions:
  ctf: "Write-ups and notes from Capture The Flag competitions."
  web: "Web exploitation techniques and vulnerabilities."
  cryptography: "Cryptographic challenges and cipher-breaking."
  forensics: "Digital forensics, steganography, and file analysis."
  security: "Security research, tools, and general concepts."
  binary: "Binary exploitation, reverse engineering, and pwn."
  misc: "Miscellaneous challenges and techniques."
