# Site Settings
title: Sakti Sadhana
# Used by search engines and link previews — keep it descriptive and keyword-bearing.
description: "Sakti Sadhana — CTF writeups, security research, and notes on cybersecurity and programming."
# Friendly greeting shown on the homepage hero (visual only, not for SEO).
tagline: "Welcome! (˶˃ ᵕ ˂˶)✧ Feel free to look around!"
url: "https://saktisadhana.github.io"
baseurl: ""
author:
  name: Sakti Sadhana
  email: ""
  bio: "(*ᴗ͈ˬᴗ͈)ꕤ*.ﾟ Blogs, WU, and etc  ✧₊⁺"
lang: en

# SEO (jekyll-seo-tag)
# Google Search Console verification is done via the googlec6412d216ddcfb6f.html
# file at the site root (HTML-file method), so no meta token is needed here.
# If you ever switch to the meta-tag method, add: google_site_verification: "<token>"
social:
  name: Sakti Sadhana
  links:
    - https://github.com/saktisadhana
    - https://instagram.com/sakti.putu
# Default social-share image (1200x630 PNG). Used on any page without a per-page og_image.
og_image: /assets/og-default.png

# Build Settings
markdown: kramdown
highlighter: rouge
# Disable kramdown's own math engine so $…$ / $$…$$ pass through as literal text
# for client-side KaTeX auto-render (self-hosted; see _includes/head.html).
kramdown:
  math_engine: null
permalink: /blog/:title/

# Cache-busting for CSS/JS. Bump this by 1 whenever you edit main.css or main.js
# so returning visitors pick up the change; unchanged builds keep the same value
# so browsers can cache the assets long-term.
asset_version: 14

# Plugins
plugins:
  - jekyll-feed
  - jekyll-seo-tag
  - jekyll-sitemap

# Collections
collections:
  projects:
    output: true
    permalink: /projects/:title/
  writeups:
    output: true
    permalink: /writeups/:title/
  playlists:
    output: true
    permalink: /playlists/:title/

# Exclude from build
exclude:
  - Gemfile
  - Gemfile.lock
  - README.md
  - REFACTORING.md
  - node_modules
  - vendor
  - tools
  - workers
  - serve.bat

# Collections
defaults:
  - scope:
      path: ""
      type: "posts"
    values:
      layout: "post"
      seo:
        type: BlogPosting
  - scope:
      path: ""
      type: "pages"
    values:
      layout: "page"
  - scope:
      path: ""
      type: "writeups"
    values:
      layout: "writeup"
      seo:
        type: BlogPosting
  - scope:
      path: ""
      type: "projects"
    values:
      layout: "project"
  - scope:
      path: ""
      type: "playlists"
    values:
      layout: "playlist"

# Feed
feed:
  path: feed.xml
  collections:
    writeups:
      path: "/feed/writeups.xml"

# Playlist descriptions — keyed by playlist name (must match exactly)
playlist_descriptions: {}

# Tag descriptions
tag_descriptions:
  ctf: "Write-ups and notes from Capture The Flag competitions."
  web: "Web exploitation techniques and vulnerabilities."
  cryptography: "Cryptographic challenges and cipher-breaking."
  forensics: "Digital forensics, steganography, and file analysis."
  security: "Security research, tools, and general concepts."
  binary: "Binary exploitation, reverse engineering, and pwn."
  misc: "Miscellaneous challenges and techniques."
