backend:
  name: github
  repo: saktisadhana/saktisadhana.github.io
  branch: main
  auth_type: pkce
  app_id: Ov23liXcd8V2etcHoGNF

media_folder: "assets/uploads"
public_folder: "/assets/uploads"

collections:
  - name: "blog"
    label: "Blog"
    folder: "_posts"
    create: true
    slug: "{{year}}-{{month}}-{{day}}-{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Publish Date", name: "date", widget: "datetime" }
      - { label: "Show on site", name: "published", widget: "boolean", default: true, hint: "Turn off to hide this post from the site (draft)." }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Playlist", name: "playlist", widget: "string", required: false, hint: "Series name — groups this post with others in the same series (e.g. 'Learning Rust')." }
      - { label: "Social Image", name: "og_image", widget: "image", required: false }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "writeups"
    label: "Writeups"
    folder: "_writeups"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Title", name: "title", widget: "string" }
      - { label: "Date", name: "date", widget: "datetime" }
      - { label: "Show on site", name: "published", widget: "boolean", default: true, hint: "Turn off to hide this writeup from the site (draft)." }
      - { label: "Description", name: "description", widget: "string", required: false }
      - { label: "Event", name: "event", widget: "string", required: false }
      - { label: "Team", name: "team", widget: "string", required: false }
      - { label: "PDF File", name: "pdf", widget: "file", required: false }
      - { label: "Social Image", name: "og_image", widget: "image", required: false }
      - { label: "Tags", name: "tags", widget: "list", required: false }
      - { label: "Playlist", name: "playlist", widget: "string", required: false, hint: "Series name — groups this writeup with others in the same series." }
      - { label: "Body", name: "body", widget: "markdown" }

  - name: "projects"
    label: "Projects"
    folder: "_projects"
    create: true
    slug: "{{slug}}"
    fields:
      - { label: "Project Name", name: "title", widget: "string" }
      - { label: "Description", name: "description", widget: "string" }
      - { label: "Tech Stack", name: "tech", widget: "list", required: false }
      - { label: "GitHub URL", name: "repo", widget: "string", required: false }
      - { label: "Live URL", name: "live", widget: "string", required: false }
      - { label: "Sort Order", name: "order", widget: "number", default: 99, required: false }
      - { label: "Body", name: "body", widget: "markdown", required: false, hint: "Full write-up shown on the project's detail page." }

  - name: "pages"
    label: "Pages"
    files:
      - label: "About"
        name: "about"
        file: "about.md"
        fields:
          - { label: "Title", name: "title", widget: "string" }
          - { label: "Permalink", name: "permalink", widget: "string" }
          - { label: "Layout", name: "layout", widget: "hidden", default: "page" }
          - { label: "Body", name: "body", widget: "markdown" }
