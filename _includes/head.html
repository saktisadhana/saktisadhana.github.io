<script>var d=document.documentElement;d.setAttribute('data-theme',localStorage.getItem('theme')||'dark');d.classList.add('js');if(localStorage.getItem('tocHidden')==='1')d.classList.add('toc-collapsed');</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="author" content="{{ site.author.name }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
<link rel="alternate icon" href="{{ '/assets/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

<!-- SEO: title, description, canonical, Open Graph, Twitter cards, and JSON-LD -->
{% seo %}

<!-- Social preview image: per-page og_image, falling back to the site default -->
{% assign social_image = page.og_image | default: site.og_image %}
{% if social_image %}
<meta property="og:image" content="{{ social_image | absolute_url }}">
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
<meta property="og:image:type" content="image/png">
<meta name="twitter:image" content="{{ social_image | absolute_url }}">
{% endif %}

<!-- Fonts (self-hosted; preload the two most-used weights) -->
<link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/inter-400.woff2' | relative_url }}" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/inter-600.woff2' | relative_url }}" crossorigin>

<!-- CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<!-- Feed -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
