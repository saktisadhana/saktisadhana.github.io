<script>var d=document.documentElement;d.setAttribute('data-theme',localStorage.getItem('theme')||'dark');d.classList.add('js');if(localStorage.getItem('tocHidden')==='1')d.classList.add('toc-collapsed');</script>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="author" content="{{ site.author.name }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">

<!-- SEO: title, description, canonical, Open Graph, Twitter cards, and JSON-LD -->
{% seo %}

<!-- Social preview image: only emitted when a real raster image exists, so we never ship a broken card -->
{% assign social_image = page.og_image | default: site.og_image %}
{% if social_image %}
<meta property="og:image" content="{{ social_image | absolute_url }}">
<meta name="twitter:image" content="{{ social_image | absolute_url }}">
{% endif %}

<!-- Fonts (async, non-render-blocking) -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" media="print" onload="this.media='all'">
<noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"></noscript>

<!-- CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}">

<!-- Feed -->
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ '/feed.xml' | relative_url }}">
