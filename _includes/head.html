<meta charset="utf-8">
<!-- CSP: no 'unsafe-inline'. The lone inline script (the no-flash theme setter
     below) is allowlisted by its SHA-256 hash — regenerate the hash if you edit
     that script. JSON-LD (jekyll-seo-tag) is a data block, not subject to CSP. -->
<meta http-equiv="Content-Security-Policy" content="default-src 'self'; base-uri 'self'; object-src 'none'; script-src 'self' 'sha256-Ib4vjS1ObfX+/UrFuiDwGLT9lGOamit0A2XmsEy38Zg=' https://giscus.app; style-src 'self' https://giscus.app; img-src 'self' data: https:; font-src 'self'; connect-src 'self' https://giscus.app; frame-src https://giscus.app; form-action 'self'; manifest-src 'self'">
<meta name="referrer" content="strict-origin-when-cross-origin">
<script>var d=document.documentElement;d.setAttribute('data-theme',localStorage.getItem('theme')||'dark');d.classList.add('js');if(localStorage.getItem('tocHidden')==='1'||window.matchMedia('(max-width:1359px)').matches)d.classList.add('toc-collapsed');</script>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0e0e0e">
<meta name="author" content="{{ site.author.name }}">
<link rel="icon" type="image/svg+xml" href="{{ '/assets/favicon.svg' | relative_url }}">
<link rel="icon" type="image/png" sizes="32x32" href="{{ '/assets/favicon-32.png' | relative_url }}">
<link rel="alternate icon" href="{{ '/assets/favicon.ico' | relative_url }}">
<link rel="apple-touch-icon" sizes="180x180" href="{{ '/assets/apple-touch-icon.png' | relative_url }}">

<!-- SEO: title, description, canonical, Open Graph, Twitter cards, and JSON-LD -->
{% seo %}

<!-- Social preview image: per-page og_image, falling back to the site default -->
{% assign social_image = page.og_image | default: site.og_image %}
{% if social_image %}
<meta property="og:image" content="{{ social_image | absolute_url }}">
{% unless page.og_image %}
<meta property="og:image:width" content="1200">
<meta property="og:image:height" content="630">
{% endunless %}
<meta property="og:image:type" content="image/png">
<meta name="twitter:card" content="summary_large_image">
<meta name="twitter:image" content="{{ social_image | absolute_url }}">
{% endif %}

<!-- Fonts (self-hosted; preload the two most-used weights) -->
<link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/inter-400.woff2' | relative_url }}" crossorigin>
<link rel="preload" as="font" type="font/woff2" href="{{ '/assets/fonts/inter-600.woff2' | relative_url }}" crossorigin>

<!-- Web app manifest (PWA) -->
<link rel="manifest" href="{{ '/site.webmanifest' | relative_url }}">

<!-- CSS -->
<link rel="stylesheet" href="{{ '/assets/css/main.css' | relative_url }}?v={{ site.time | date: '%s' }}">

<!-- Feed discovery (main posts feed + any collection feeds) -->
{% feed_meta %}
