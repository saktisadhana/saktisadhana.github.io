<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0e0e0e"/>
  <!-- Green left accent bar -->
  <rect x="0" y="0" width="6" height="630" fill="#3ddc84"/>
  <!-- Subtle grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#1a1a1a" stroke-width="1"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <!-- Green accent bar again on top of grid -->
  <rect x="0" y="0" width="6" height="630" fill="#3ddc84"/>
  <!-- Name -->
  <text x="80" y="270" font-family="'Courier New', Courier, monospace" font-size="68" font-weight="700" fill="#e5e5e5">Sakti Sadhana</text>
  <!-- Tagline -->
  <text x="80" y="340" font-family="'Courier New', Courier, monospace" font-size="26" fill="#888888">IT undergrad · CTF player · Security research</text>
  <!-- Divider line -->
  <line x1="80" y1="380" x2="520" y2="380" stroke="#3ddc84" stroke-width="1" opacity="0.4"/>
  <!-- URL -->
  <text x="80" y="560" font-family="'Courier New', Courier, monospace" font-size="24" fill="#3ddc84">saktisadhana.github.io</text>
  <!-- Decorative corner bracket top-right -->
  <path d="M 1140 40 L 1160 40 L 1160 60" fill="none" stroke="#3ddc84" stroke-width="2" opacity="0.5"/>
  <!-- Decorative corner bracket bottom-right -->
  <path d="M 1140 590 L 1160 590 L 1160 570" fill="none" stroke="#3ddc84" stroke-width="2" opacity="0.5"/>
</svg>
